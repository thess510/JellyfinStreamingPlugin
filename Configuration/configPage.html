<!DOCTYPE html>
<html lang="en">
<head>
    <title>Streaming Discovery</title>
</head>
<body>
    <div id="StreamingDiscoveryConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">

                <form id="StreamingDiscoveryConfigForm">

                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">Streaming Discovery</h2>
                    </div>

                    <div id="saveStatus" style="display:none; padding: 10px; margin-bottom: 10px; border-radius: 4px;"></div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="TmdbApiKey">
                            TMDB API Key <em>(required — get a free key at <a href="https://www.themoviedb.org/settings/api" target="_blank">themoviedb.org</a>)</em>
                        </label>
                        <input id="TmdbApiKey" name="TmdbApiKey" type="text" is="emby-input" placeholder="Your TMDB API key" />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="CountryCode">Country Code</label>
                        <input id="CountryCode" name="CountryCode" type="text" is="emby-input" placeholder="US" maxlength="2" />
                        <div class="fieldDescription">ISO 3166-1 alpha-2 country code (e.g. US, GB, CA)</div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="SyncIntervalHours">Sync Interval (hours)</label>
                        <input id="SyncIntervalHours" name="SyncIntervalHours" type="number" is="emby-input" min="1" max="168" placeholder="6" />
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="MaxItemsPerCategory">Max Items Per Category</label>
                        <input id="MaxItemsPerCategory" name="MaxItemsPerCategory" type="number" is="emby-input" min="10" max="500" placeholder="100" />
                    </div>

                    <h3 class="sectionTitle">Content Types</h3>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeMovies" name="IncludeMovies" type="checkbox" is="emby-checkbox" />
                            <span>Movies</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeTvShows" name="IncludeTvShows" type="checkbox" is="emby-checkbox" />
                            <span>TV Shows</span>
                        </label>
                    </div>

                    <h3 class="sectionTitle">Streaming Services</h3>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeNetflix" name="IncludeNetflix" type="checkbox" is="emby-checkbox" />
                            <span>Netflix</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeHulu" name="IncludeHulu" type="checkbox" is="emby-checkbox" />
                            <span>Hulu</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeDisneyPlus" name="IncludeDisneyPlus" type="checkbox" is="emby-checkbox" />
                            <span>Disney+</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludePrimeVideo" name="IncludePrimeVideo" type="checkbox" is="emby-checkbox" />
                            <span>Prime Video</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeAppleTvPlus" name="IncludeAppleTvPlus" type="checkbox" is="emby-checkbox" />
                            <span>Apple TV+</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeMax" name="IncludeMax" type="checkbox" is="emby-checkbox" />
                            <span>Max</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludePeacock" name="IncludePeacock" type="checkbox" is="emby-checkbox" />
                            <span>Peacock</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludeFubo" name="IncludeFubo" type="checkbox" is="emby-checkbox" />
                            <span>Fubo</span>
                        </label>
                    </div>
                    <div class="checkboxContainer">
                        <label class="emby-checkbox-label">
                            <input id="IncludePhilo" name="IncludePhilo" type="checkbox" is="emby-checkbox" />
                            <span>Philo</span>
                        </label>
                    </div>

                    <br />
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>Save</span>
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        var PLUGIN_ID = "4a8b1c2d-3e4f-5a6b-7c8d-9e0f1a2b3c4d";

        function getToken() {
            try { return ApiClient.accessToken(); } catch(e) {}
            try { return ApiClient._accessToken; } catch(e) {}
            // Fall back: read from stored credentials
            try {
                var creds = JSON.parse(localStorage.getItem('jellyfin_credentials') || '{}');
                var servers = creds.Servers || [];
                if (servers.length > 0) return servers[0].AccessToken;
            } catch(e) {}
            return null;
        }

        function showStatus(msg, isError) {
            var el = document.getElementById('saveStatus');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = isError ? '#c0392b' : '#27ae60';
            el.style.color = '#fff';
            setTimeout(function() { el.style.display = 'none'; }, 3000);
        }

        function loadConfig(page) {
            var token = getToken();
            fetch('/Plugins/' + PLUGIN_ID + '/Configuration', {
                headers: { 'X-Emby-Token': token, 'X-MediaBrowser-Token': token }
            })
            .then(function(r) { return r.json(); })
            .then(function(config) {
                page.querySelector('#TmdbApiKey').value = config.TmdbApiKey || '';
                page.querySelector('#CountryCode').value = config.CountryCode || 'US';
                page.querySelector('#SyncIntervalHours').value = config.SyncIntervalHours || 6;
                page.querySelector('#MaxItemsPerCategory').value = config.MaxItemsPerCategory || 100;
                page.querySelector('#IncludeMovies').checked = config.IncludeMovies !== false;
                page.querySelector('#IncludeTvShows').checked = config.IncludeTvShows !== false;
                page.querySelector('#IncludeNetflix').checked = config.IncludeNetflix !== false;
                page.querySelector('#IncludeHulu').checked = config.IncludeHulu !== false;
                page.querySelector('#IncludeDisneyPlus').checked = config.IncludeDisneyPlus !== false;
                page.querySelector('#IncludePrimeVideo').checked = config.IncludePrimeVideo !== false;
                page.querySelector('#IncludeAppleTvPlus').checked = config.IncludeAppleTvPlus !== false;
                page.querySelector('#IncludeMax').checked = config.IncludeMax !== false;
                page.querySelector('#IncludePeacock').checked = config.IncludePeacock !== false;
                page.querySelector('#IncludeFubo').checked = config.IncludeFubo === true;
                page.querySelector('#IncludePhilo').checked = config.IncludePhilo === true;
            })
            .catch(function(e) { console.error('Failed to load config', e); });
        }

        function saveConfig(page) {
            var token = getToken();
            var config = {
                TmdbApiKey: page.querySelector('#TmdbApiKey').value,
                CountryCode: page.querySelector('#CountryCode').value || 'US',
                SyncIntervalHours: parseInt(page.querySelector('#SyncIntervalHours').value) || 6,
                MaxItemsPerCategory: parseInt(page.querySelector('#MaxItemsPerCategory').value) || 100,
                IncludeMovies: page.querySelector('#IncludeMovies').checked,
                IncludeTvShows: page.querySelector('#IncludeTvShows').checked,
                IncludeNetflix: page.querySelector('#IncludeNetflix').checked,
                IncludeHulu: page.querySelector('#IncludeHulu').checked,
                IncludeDisneyPlus: page.querySelector('#IncludeDisneyPlus').checked,
                IncludePrimeVideo: page.querySelector('#IncludePrimeVideo').checked,
                IncludeAppleTvPlus: page.querySelector('#IncludeAppleTvPlus').checked,
                IncludeMax: page.querySelector('#IncludeMax').checked,
                IncludePeacock: page.querySelector('#IncludePeacock').checked,
                IncludeFubo: page.querySelector('#IncludeFubo').checked,
                IncludePhilo: page.querySelector('#IncludePhilo').checked
            };

            fetch('/Plugins/' + PLUGIN_ID + '/Configuration', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Emby-Token': token,
                    'X-MediaBrowser-Token': token
                },
                body: JSON.stringify(config)
            })
            .then(function(r) {
                if (r.ok) {
                    showStatus('Settings saved!', false);
                } else {
                    return r.text().then(function(t) { showStatus('Error: ' + t, true); });
                }
            })
            .catch(function(e) { showStatus('Error saving settings: ' + e, true); });
        }

        document.querySelector('#StreamingDiscoveryConfigPage')
            .addEventListener('pageshow', function(e) { loadConfig(e.target); });

        document.querySelector('#StreamingDiscoveryConfigForm')
            .addEventListener('submit', function(e) {
                e.preventDefault();
                saveConfig(document.querySelector('#StreamingDiscoveryConfigPage'));
                return false;
            });
    </script>
</body>
</html>
